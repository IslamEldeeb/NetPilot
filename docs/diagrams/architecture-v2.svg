<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>NetPilot system architecture, updated</title>
  <desc>Devices grouped by category are managed through two separate TP-Link protocols: the HTTPS cgi-bin JSON API used by the Web UI, and the TMP raw TCP protocol used by the Tether app. Both reach a shared firmware backend that already tracks device type, speed limit, and QoS priority per client. NetPilot's .NET agent talks to the confirmed API to enforce category-based speed limits.</desc>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1000" height="800" fill="white"/>
  <text x="500" y="32" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="600" fill="#1a1a1a">NetPilot — Two Protocols, One Device Model (v2)</text>

  <g font-family="sans-serif">
    <g>
      <rect x="50" y="60" width="205" height="62" rx="10" fill="#eef2f7" stroke="#c7ccd4"/>
      <text x="152" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Mobile Phones</text>
      <text x="152" y="106" text-anchor="middle" font-size="12" fill="#55606b">target: 20 Mbps</text>
    </g>
    <g>
      <rect x="270" y="60" width="205" height="62" rx="10" fill="#eef2f7" stroke="#c7ccd4"/>
      <text x="372" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">TVs</text>
      <text x="372" y="106" text-anchor="middle" font-size="12" fill="#55606b">target: unlimited</text>
    </g>
    <g>
      <rect x="490" y="60" width="205" height="62" rx="10" fill="#eef2f7" stroke="#c7ccd4"/>
      <text x="592" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Cameras</text>
      <text x="592" y="106" text-anchor="middle" font-size="12" fill="#55606b">target: 2 Mbps</text>
    </g>
    <g>
      <rect x="710" y="60" width="240" height="62" rx="10" fill="#eef2f7" stroke="#c7ccd4"/>
      <text x="830" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Game Consoles / Unknown</text>
      <text x="830" y="106" text-anchor="middle" font-size="12" fill="#55606b">target: 5 Mbps (default)</text>
    </g>
  </g>

  <path d="M152,122 L152,150 L480,150 L480,168" fill="none" stroke="#888" stroke-width="1.5"/>
  <path d="M372,122 L372,168" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <path d="M592,122 L592,168" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <path d="M830,122 L830,150 L480,150" fill="none" stroke="#888" stroke-width="1.5"/>

  <rect x="150" y="170" width="330" height="72" rx="10" fill="#dfe7f0" stroke="#7c8794" stroke-width="1.5"/>
  <text x="315" y="197" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Web UI — HTTPS cgi-bin JSON API</text>
  <text x="315" y="215" text-anchor="middle" font-size="11" fill="#55606b">RSA+AES · stok/sysauth session (§3)</text>
  <text x="315" y="231" text-anchor="middle" font-size="11" fill="#55606b">used by NetPilot's primary SDK</text>

  <rect x="520" y="170" width="330" height="72" rx="10" fill="#dfe7f0" stroke="#7c8794" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="685" y="197" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Tether App — TMP protocol</text>
  <text x="685" y="215" text-anchor="middle" font-size="11" fill="#55606b">raw TCP, opcode-based, port ~20002 (§6b)</text>
  <text x="685" y="231" text-anchor="middle" font-size="11" fill="#55606b">local direct, or cloud-relayed SSH tunnel</text>

  <path d="M315,242 L315,270 L480,270 L480,288" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <path d="M685,242 L685,270 L480,270" fill="none" stroke="#888" stroke-width="1.5"/>

  <rect x="230" y="290" width="500" height="86" rx="10" fill="#f5f7f9" stroke="#7c8794" stroke-width="1.5"/>
  <text x="480" y="314" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Shared AX53 firmware device model</text>
  <text x="480" y="333" text-anchor="middle" font-size="11.5" fill="#55606b">devType (category) · slEnable/upLimit/downLimit (Speed Limit)</text>
  <text x="480" y="350" text-anchor="middle" font-size="11.5" fill="#55606b">qosPrior + schedule (Tether Priority) — confirmed to exist (§6a),</text>
  <text x="480" y="367" text-anchor="middle" font-size="11.5" fill="#808a94">exact AX53 JSON field names pending live confirmation</text>

  <path d="M480,376 L480,406" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <path d="M420,406 L420,376" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <rect x="140" y="408" width="680" height="108" rx="10" fill="none" stroke="#c7ccd4" stroke-dasharray="4 3"/>
  <text x="160" y="428" font-size="13" font-weight="600" fill="#1a1a1a">NetPilot Agent (.NET, runs on home LAN)</text>

  <rect x="160" y="438" width="200" height="62" rx="8" fill="#eef2f7" stroke="#c7ccd4"/>
  <text x="260" y="462" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Device Classifier</text>
  <text x="260" y="480" text-anchor="middle" font-size="11" fill="#55606b">OUI/hostname + devType</text>

  <path d="M360,469 L400,469" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <rect x="400" y="438" width="200" height="62" rx="8" fill="#eef2f7" stroke="#c7ccd4"/>
  <text x="500" y="462" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Policy Engine</text>
  <text x="500" y="480" text-anchor="middle" font-size="11" fill="#55606b">category → Mbps rules</text>

  <path d="M600,469 L640,469" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <rect x="640" y="438" width="160" height="62" rx="8" fill="#eef2f7" stroke="#c7ccd4"/>
  <text x="720" y="462" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">TpLink.Sdk Client</text>
  <text x="720" y="480" text-anchor="middle" font-size="11" fill="#55606b">HTTPS API primary</text>

  <path d="M480,516 L480,546" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <rect x="290" y="548" width="380" height="76" rx="10" fill="#eef2f7" stroke="#7c8794"/>
  <text x="480" y="574" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">TpLinkSpeedLimitEnforcer (primary)</text>
  <text x="480" y="592" text-anchor="middle" font-size="11" fill="#55606b">writes sl_enable/up_limit/down_limit via §6a endpoint</text>
  <text x="480" y="608" text-anchor="middle" font-size="11" fill="#808a94">expected primary path — confirm exact endpoint live first</text>

  <rect x="140" y="650" width="720" height="130" rx="10" fill="#f5f7f9" stroke="#c7ccd4"/>
  <text x="160" y="674" font-size="13" font-weight="700" fill="#1a1a1a">What changed from v1</text>
  <text x="160" y="696" font-size="12" fill="#55606b">Speed Limit ≠ HomeShield QoS — confirmed real, separate TP-Link feature (§5a), matches your screenshots</text>
  <text x="160" y="716" font-size="12" fill="#55606b">devType/slEnable/qosPrior fields proven to exist in TP-Link's shared backend via sibling-model test fixtures (§6a)</text>
  <text x="160" y="736" font-size="12" fill="#55606b">Tether uses a distinct protocol (TMP, port ~20002), not the Web UI's HTTPS API — evidence-backed (§6b)</text>
  <text x="160" y="756" font-size="12" fill="#55606b">Traffic-shaping bridge demoted to fallback-only; router-native enforcement is now the expected primary path</text>
  <text x="160" y="774" font-size="12" fill="#808a94">Dashed border = still pending live confirmation (Chrome extension not yet connected)</text>
</svg>
