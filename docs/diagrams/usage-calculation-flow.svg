<svg viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Flow of usage calculation in NetPilot</title>
  <desc>Agent polls the router every tick, reads each device's traffic counter, compares it to the last saved value, and updates a running total based on whether it's the first reading, an increase, or a decrease (reset).</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="680" height="660" fill="white"/>

  <g font-family="sans-serif">
    <!-- Node 1: poll -->
    <rect x="180" y="20" width="320" height="44" rx="8" fill="#eef2f7" stroke="#c7ccd4"/>
    <text x="340" y="47" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Poll router — every tick (PollIntervalSeconds)</text>
    <line x1="340" y1="64" x2="340" y2="120" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Node 2: read -->
    <rect x="180" y="124" width="320" height="44" rx="8" fill="#eef2f7" stroke="#c7ccd4"/>
    <text x="340" y="151" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Read device's trafficUsage</text>
    <line x1="340" y1="168" x2="340" y2="224" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Node 3: compare (decision) -->
    <rect x="180" y="228" width="320" height="56" rx="8" fill="#dfe7f0" stroke="#7c8794" stroke-width="1.5"/>
    <text x="340" y="252" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Compare to saved value</text>
    <text x="340" y="270" text-anchor="middle" font-size="12" fill="#55606b">per device, every tick</text>

    <!-- Fan-out arrows -->
    <line x1="340" y1="284" x2="140" y2="344" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="340" y1="284" x2="340" y2="344" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="340" y1="284" x2="540" y2="344" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Outcome A: first time seen -->
    <rect x="50" y="344" width="180" height="56" rx="8" fill="#e6f3ea" stroke="#8fbf9f"/>
    <text x="140" y="368" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">First time seen</text>
    <text x="140" y="386" text-anchor="middle" font-size="11" fill="#4c6b57">count full value</text>

    <!-- Outcome B: increased -->
    <rect x="250" y="344" width="180" height="56" rx="8" fill="#e3edf7" stroke="#86adda"/>
    <text x="340" y="368" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Counter increased</text>
    <text x="340" y="386" text-anchor="middle" font-size="11" fill="#3d5a7a">add the difference</text>

    <!-- Outcome C: decreased / reset -->
    <rect x="450" y="344" width="180" height="56" rx="8" fill="#f8e8e0" stroke="#d99873"/>
    <text x="540" y="368" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Counter decreased</text>
    <text x="540" y="386" text-anchor="middle" font-size="11" fill="#8a5a3a">reset, logs event</text>

    <!-- Converge arrows -->
    <line x1="140" y1="400" x2="340" y2="456" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="340" y1="400" x2="340" y2="456" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="540" y1="400" x2="340" y2="456" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Node 5: update total -->
    <rect x="180" y="460" width="320" height="44" rx="8" fill="#eef2f7" stroke="#c7ccd4"/>
    <text x="340" y="487" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Update running total (month + day)</text>
    <line x1="340" y1="504" x2="340" y2="560" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Node 6: save -->
    <rect x="180" y="564" width="320" height="44" rx="8" fill="#eef2f7" stroke="#c7ccd4"/>
    <text x="340" y="591" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Save to usage_state (LiteDB)</text>

    <!-- Legend -->
    <text x="40" y="632" font-size="11" fill="#808a94">First observation is counted in full immediately (not held back as a baseline) — see phase2-usage-tracking-feature.md.</text>
    <text x="40" y="648" font-size="11" fill="#808a94">Month/day rollover (finalize previous period into history) runs before this branch on every tick — omitted here for clarity.</text>
  </g>
</svg>
