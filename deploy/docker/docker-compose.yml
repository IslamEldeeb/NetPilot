services:
  netpilot-agent:
    image: netpilot/agent:latest
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.agent
    volumes:
      - netpilot-data:/data
    environment:
      - ROUTER_HOST=${ROUTER_HOST:-}
      - ROUTER_PASSWORD=${ROUTER_PASSWORD:-}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  netpilot-web:
    image: netpilot/web:latest
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
    volumes:
      - netpilot-data:/data
    ports:
      - "8080:8080"
      - 
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    restart: unless-stopped

volumes:
  netpilot-data: